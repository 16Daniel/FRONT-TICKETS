<p-dialog [header]="'SUBIR EVIDENCIA PARA ' + titulo" [modal]="true" [(visible)]="mostrarModal"
  [style]="{ width: '40vw', height: '65vh' }" [maximizable]="true" (onHide)="onHide()">

  <!-- =========================
       PANTALLAS
  ========================== -->
  <div *ngIf="titulo === 'PANTALLAS'">

    <div *ngFor="let tv of mantenimiento?.tvs; let i = index" class="mb-4">

      <h5 class="mb-2">
        Pantalla {{ i + 1 }}
      </h5>

      <!-- Área de subida -->
      <div class="upload-container" (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)"
        (drop)="onDrop($event, i)">

        <input type="file" hidden accept="image/*" multiple (change)="onFileSelected($event, i)" #fileInputPantalla />

        <div class="upload-content">

          <i class="pi pi-upload upload-icon"></i>

          <p class="upload-text">
            Arrastra y suelta una imagen aquí
          </p>

          <p class="upload-separator">o</p>

          <button type="button" class="btn-upload" (click)="fileInputPantalla.click()">
            Seleccionar imagen
          </button>

        </div>

      </div>

      <!-- PREVIEW POR PANTALLA -->
      <div *ngIf="imagenesBase64PorDispositivo[i]?.length" class="preview-container">

        <div *ngFor="let img of imagenesBase64PorDispositivo[i]" class="preview-item">
          <img [src]="img" alt="Vista previa" />
        </div>

      </div>

    </div>

  </div>


  <!-- =========================
       BOCINAS
  ========================== -->
  <div *ngIf="titulo === 'BOCINAS'">

    <div *ngFor="let bocina of mantenimiento?.bocinas; let i = index" class="mb-4">

      <h5 class="mb-2">
        Bocina {{ i + 1 }}
      </h5>

      <!-- Área de subida -->
      <div class="upload-container" (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)"
        (drop)="onDrop($event, i)">

        <input type="file" hidden accept="image/*" multiple (change)="onFileSelected($event, i)" #fileInputBocina />

        <div class="upload-content">

          <i class="pi pi-upload upload-icon"></i>

          <p class="upload-text">
            Arrastra y suelta una imagen aquí
          </p>

          <p class="upload-separator">o</p>

          <button type="button" class="btn-upload" (click)="fileInputBocina.click()">
            Seleccionar imagen
          </button>

        </div>

      </div>

      <!-- PREVIEW POR BOCINA -->
      <div *ngIf="imagenesBase64PorDispositivo[i]?.length" class="preview-container">

        <div *ngFor="let img of imagenesBase64PorDispositivo[i]" class="preview-item">
          <img [src]="img" alt="Vista previa" />
        </div>

      </div>

    </div>

  </div>


  <ng-template pTemplate="footer">

    <div class="footer-actions">

      <button type="button" class="btn-confirm" (click)="subirImagen()">
        <i class="pi pi-check"></i> Subir
      </button>

    </div>

  </ng-template>

</p-dialog>
