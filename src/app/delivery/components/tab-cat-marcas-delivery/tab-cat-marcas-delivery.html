<div>

    <p-toast></p-toast>

<div>
    <p-toolbar styleClass="mb-4">
        <ng-template pTemplate="left">
            <button pButton pRipple label="Nuevo" icon="pi pi-plus" class="p-button-success mr-2" (click)="openNew()"></button>
        </ng-template>
    </p-toolbar>

    <p-table #dt [value]="marcas" [rows]="10" [paginator]="true" [globalFilterFields]="['nombre','secciones']" responsiveLayout="scroll"
        [rowHover]="true" dataKey="id">
        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="id">ID <p-sortIcon field="id"></p-sortIcon></th>
                <th pSortableColumn="nombre">Nombre <p-sortIcon field="nombre"></p-sortIcon></th>
                <th pSortableColumn="secciones">Secciones <p-sortIcon field="secciones"></p-sortIcon></th>
                <th>Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-marca>
            <tr>
                <td>{{marca.id}}</td>
                <td>{{marca.nombre}}</td>
                <td>{{marca.secciones || 'N/A'}}</td>
                <td>
                    <button pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-success mr-2" (click)="editMarca(marca)"></button>
                    <button pButton pRipple icon="pi pi-trash" class="p-button-rounded p-button-warning" (click)="deleteMarca(marca)"></button>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="summary">
            <div class="flex align-items-center justify-content-between">
                En total hay {{marcas ? marcas.length : 0 }} marcas.
            </div>
        </ng-template>
    </p-table>
</div>

<p-dialog [(visible)]="marcaDialog" [style]="{width: '450px'}" header="Detalles de la Marca" [modal]="true" styleClass="p-fluid">
    <ng-template pTemplate="content">
        <div class="field">
            <label for="nombre">Nombre</label>
            <input type="text" pInputText id="nombre" [(ngModel)]="marca.nombre" required autofocus />
            <small class="p-error" *ngIf="submitted && !marca.nombre">El nombre es requerido.</small>
        </div>
        <div class="field mt-3">
            <label for="secciones">Secciones (ingresar codigos separados por ",")</label>
            <input type="text" id="secciones" pInputText [(ngModel)]="marca.secciones"/>
        </div>
    </ng-template>

    <ng-template pTemplate="footer">
        <button pButton pRipple label="Cancelar" icon="pi pi-times" class="p-button-text" (click)="hideDialog()"></button>
        <button pButton pRipple label="Guardar" icon="pi pi-check" class="p-button-text" (click)="saveMarca()"></button>
    </ng-template>
</p-dialog>

<p-confirmDialog [style]="{width: '450px'}"></p-confirmDialog>

</div>
